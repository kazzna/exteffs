name: On Push

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          # renovate: datasource=java-version packageName=java
          java-version: 21.0.11+10.0.LTS

      - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2

      - name: Configure GitHub Packages credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.sbt/1.0
          cat <<EOF > ~/.sbt/1.0/ghpackages.credentials
          realm=GitHub Package Registry
          host=maven.pkg.github.com
          user=${GITHUB_ACTOR}
          password=${GITHUB_TOKEN}
          EOF
          chmod 600 ~/.sbt/1.0/ghpackages.credentials
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run compile and tests
        shell: bash
        run: sbt --verbose "+test"
