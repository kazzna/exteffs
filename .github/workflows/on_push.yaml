name: On Push

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          # renovate: datasource=java-version packageName=java
          java-version: 21.0.11+10.0.LTS

      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Configure GitHub Packages credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.sbt/1.0
          cat <<EOF > ~/.sbt/1.0/ghpackages.credentials
          realm=GitHub Package Registry
          host=maven.pkg.github.com
          user=${GITHUB_ACTOR}
          password=${GITHUB_TOKEN}
          EOF
          chmod 600 ~/.sbt/1.0/ghpackages.credentials
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run compile and tests
        shell: bash
        run: sbt --verbose "+test"
