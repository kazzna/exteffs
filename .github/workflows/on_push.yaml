name: On Push

on:
  push:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          # renovate: datasource=java-version packageName=java
          java-version: 21.0.11+10.0.LTS

      - uses: sbt/setup-sbt@3afe9cf056c5d139bfc46579af1192d77a2f0821 # v1.4.0

      - name: Configure GitHub Packages credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.sbt/1.0
          cat <<EOF > ~/.sbt/1.0/ghpackages.credentials
          realm=GitHub Package Registry
          host=maven.pkg.github.com
          user=${GITHUB_ACTOR}
          password=${GITHUB_TOKEN}
          EOF
          chmod 600 ~/.sbt/1.0/ghpackages.credentials
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run compile and tests
        shell: bash
        run: sbt --verbose "+test"
