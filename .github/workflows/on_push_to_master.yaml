name: On the Default Branch Changes

on:
  workflow_run:
    workflows:
      - On Push
    branches:
      - master
    types:
      - completed

jobs:
  publish-snapshot:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    env:
      GITHUB_PACKAGES_MAVEN_URL: https://maven.pkg.github.com/${{ github.repository }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          # renovate: datasource=java-version packageName=java
          java-version: 21.0.10+7.0.LTS

      - uses: sbt/setup-sbt@508b753e53cb6095967669e0911487d2b9bc9f41 # v1.1.22

      - name: Configure GitHub Packages credentials
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.sbt/1.0
          cat <<EOF > ~/.sbt/1.0/ghpackages.credentials
          realm=GitHub Package Registry
          host=maven.pkg.github.com
          user=${GITHUB_ACTOR}
          password=${GITHUB_TOKEN}
          EOF
          chmod 600 ~/.sbt/1.0/ghpackages.credentials
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine package metadata and SNAPSHOT
        id: pkg_meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(sbt -Dsbt.log.noformat=true "print version" | tail -1)
          NAME=$(sbt -Dsbt.log.noformat=true "print name" | tail -1)
          ORGANIZATION=$(sbt -Dsbt.log.noformat=true "print organization" | tail -1)
          SCALA_BINARY_VERSION=$(sbt -Dsbt.log.noformat=true "print scalaBinaryVersion" | tail -1)

          PACKAGE_NAME="$ORGANIZATION.$NAME"
          if [ -n "$SCALA_BINARY_VERSION" ]; then
            PACKAGE_NAME="${ORGANIZATION}.${NAME}_${SCALA_BINARY_VERSION}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "organization=$ORGANIZATION" >> $GITHUB_OUTPUT
          echo "scala_binary_version=$SCALA_BINARY_VERSION" >> $GITHUB_OUTPUT
          echo "package_name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"SNAPSHOT"* ]]; then
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
            echo "Version is SNAPSHOT: $VERSION"
          else
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
            echo "Version is not SNAPSHOT (skipping publish): $VERSION"
          fi

      - name: Delete existing SNAPSHOT version if exists
        if: steps.pkg_meta.outputs.is_snapshot == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ steps.pkg_meta.outputs.package_name }}
          PACKAGE_TYPE: maven
          SCOPE: users
          VERSION: ${{ steps.pkg_meta.outputs.version }}
        run: |
          set -euo pipefail
          echo "Looking for package `$PACKAGE_NAME:$VERSION`"

          PACKAGE_ID=$(gh api -H "Accept: application/vnd.github+json" \
            /$SCOPE/$OWNER/packages?package_type=$PACKAGE_TYPE \
            --jq ".[] | select(.name==\"$PACKAGE_NAME\") | .id" || true)

          if [[ -z "$PACKAGE_ID" ]]; then
            echo "Package not found in org/users scope; skipping delete."
            exit 0
          fi

          # Detect multiple packages with the same name
          PACKAGE_ID_COUNT=$(echo "$PACKAGE_ID" | wc -l)
          if [[ $PACKAGE_ID_COUNT -gt 1 ]]; then
            echo "ERROR: Multiple packages found with the same name: $PACKAGE_NAME"
            exit 1
          fi

          VERSIONS_JSON=$(gh api -H "Accept: application/vnd.github+json" \
            /$SCOPE/$OWNER/packages/$PACKAGE_TYPE/$PACKAGE_NAME/versions || true)

          if [[ -z "$VERSIONS_JSON" ]]; then
            echo "ERROR: Failed to retrieve package versions"
            exit 1
          fi

          VERSION_COUNT=$(echo "$VERSIONS_JSON" | jq 'length')
          VERSION_ID=$(echo "$VERSIONS_JSON" | jq -r --arg VER "$VERSION" '.[] | select(.name==$VER) | .id' || true)

          if [[ -z "$VERSION_ID" ]]; then
            echo "No existing version found; no deletion needed."
            exit 0
          fi

          # Detect multiple versions with the same name
          VERSION_ID_COUNT=$(echo "$VERSION_ID" | wc -l)
          if [[ $VERSION_ID_COUNT -gt 1 ]]; then
            echo "ERROR: Multiple versions found with the same name: $VERSION"
            exit 1
          fi

          if [[ "$VERSION_COUNT" -le 1 ]]; then
            echo "Version count is $VERSION_COUNT (last version); deleting package $PACKAGE_NAME"
            gh api --method DELETE -H "Accept: application/vnd.github+json" \
              /$SCOPE/$OWNER/packages/$PACKAGE_TYPE/$PACKAGE_NAME
          else
            echo "Version count is $VERSION_COUNT; deleting version $VERSION ($VERSION_ID)"
            gh api --method DELETE -H "Accept: application/vnd.github+json" \
              /$SCOPE/$OWNER/packages/$PACKAGE_TYPE/$PACKAGE_NAME/versions/$VERSION_ID
          fi

      - name: Publish to GitHub Packages
        if: steps.pkg_meta.outputs.is_snapshot == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt publish
